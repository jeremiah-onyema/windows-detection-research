title: PowerShell Spawning Child PowerShell with Obfuscated Command Line
id: 7c4a8e61-2d09-4f17-9345-1b5f7e293a08
status: experimental
description: >
    Detects a PowerShell process spawning another PowerShell process
    where the child command line shows format-string construction.
    It works off process creation, not Script Block Logging, so it
    still covers hosts where 4104 is off or where the decoded
    payload never gets logged.

    In lab against T1027 Test 7, Wazuh rule 92027 fired on this same
    parent-child pattern, but it's generic and fires on any
    PowerShell spawning PowerShell. This one is tighter. It also
    wants the child command line to show signs of runtime code
    assembly, which cuts the noise but still catches the same trick.
author: jeremiah-onyena
date: 2026-04-15
references:
    - https://attack.mitre.org/techniques/T1027/
    - https://attack.mitre.org/techniques/T1059/001/
    - https://github.com/jeremiah-onyena
tags:
    - attack.defense_evasion
    - attack.t1027
    - attack.t1059.001
logsource:
    product: windows
    category: process_creation
detection:
    selection_parent:
        ParentImage|endswith: '\powershell.exe'
    selection_child:
        Image|endswith: '\powershell.exe'
    selection_cmdline_indicators:
        CommandLine|contains:
            - ' -f '
            - 'ToInt16'
            - 'ToInt32'
            - '[TyPe]'
            - '[TYpE]'
    condition: selection_parent and selection_child and selection_cmdline_indicators
falsepositives:
    - Automated test frameworks including Atomic Red Team
    - Legitimate PowerShell tooling that spawns child processes with format strings
level: high
