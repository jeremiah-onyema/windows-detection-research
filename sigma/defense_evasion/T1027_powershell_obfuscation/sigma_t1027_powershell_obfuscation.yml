title: PowerShell Numeric Array Character Assembly via Runtime Conversion
id: 9f3e1a72-4c08-4b5d-b891-2d6c0f837e14
status: experimental
description: >
    Detects a PowerShell obfuscation trick where a numeric array is
    turned back into a string one character at a time, using
    Convert::ToInt16 with a base and a [char] cast. Building the
    string at runtime like this, instead of writing it out, is the
    core of base-agnostic obfuscation.

    It turned up in Atomic Red Team T1027 Test 7 and in the Red
    Canary 2021 Threat Detection Report. What I found in the lab is
    that when IEX itself is assembled at runtime from format strings
    and reflection, Script Block Logging (4104) records the outer
    obfuscated block but not the decoded payload. So this rule keys
    on the one part the attacker can't drop without breaking the
    trick, the numeric conversion pipeline.
author: jeremiah-onyena
date: 2026-04-15
references:
    - https://attack.mitre.org/techniques/T1027/
    - https://redcanary.com/threat-detection-report/2021/
    - https://github.com/jeremiah-onyena
tags:
    - attack.defense_evasion
    - attack.t1027
    - attack.t1059.001
logsource:
    product: windows
    category: ps_script
    definition: 'Requires Script Block Logging - Event ID 4104 from Microsoft-Windows-PowerShell/Operational'
detection:
    selection_conversion:
        ScriptBlockText|contains:
            - 'ToInt16'
            - 'ToInt32'
    selection_char:
        ScriptBlockText|contains:
            - '[CHAR]'
            - '[char]'
    selection_pipeline:
        ScriptBlockText|contains:
            - ".('%')"
            - "| .('%')"
            - 'ForEach-Object'
    condition: selection_conversion and selection_char and selection_pipeline
falsepositives:
    - Custom encoding utilities that happen to use numeric-to-char conversion
    - Security tooling with character manipulation routines
level: high

