title: PowerShell Dynamic Type Construction with Format String IEX Assembly
id: 3b7d2f95-1e4a-4c89-a056-8f9e4b612c30
status: experimental
description: >
    Detects PowerShell script blocks that build a type or function
    name on the fly with the -f format operator and [TyPe]
    reflection. This is how attackers hide Invoke-Expression itself,
    so that Script Block Logging doesn't see it as a new
    compilation.

    When IEX is called by name, 4104 logs a second event with the
    decoded payload. When IEX is assembled at runtime and called
    through the & operator, 4104 only logs the outer obfuscated
    block and the decoded content runs in memory with no log entry.
    This rule catches the construction step before it gets that far.
author: jeremiah-onyena
date: 2026-04-15
references:
    - https://attack.mitre.org/techniques/T1027/
    - https://github.com/danielbohannon/Invoke-Obfuscation
    - https://github.com/jeremiah-onyena
tags:
    - attack.defense_evasion
    - attack.t1027
    - attack.t1059.001
logsource:
    product: windows
    category: ps_script
    definition: 'Requires Script Block Logging - Event ID 4104'
detection:
    selection_type_reflection:
        ScriptBlockText|contains:
            - '[TyPe]'
            - '[TYpE]'
            - '[tYpE]'
    selection_format_assembly:
        ScriptBlockText|contains:
            - '-f '
    selection_call_operator:
        ScriptBlockText|contains:
            - '&('
    condition: selection_type_reflection and selection_format_assembly and selection_call_operator
falsepositives:
    - Legitimate admin scripts using type reflection for compatibility checks
    - Some module loading patterns that dynamically resolve type names
level: high

