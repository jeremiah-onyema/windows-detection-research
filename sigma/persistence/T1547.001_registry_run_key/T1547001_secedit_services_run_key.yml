title: Services.exe Writing Executable to Registry Run Key via secedit LOLBIN
id: f7a8b9c0-d1e2-3456-fabc-012345678901
status: experimental
description: >
    Detects services.exe writing an executable value to a Run key.
    This is the write you see when secedit sets Run key persistence
    from a security template. secedit never shows up as the writer.
    The write comes through services.exe running as SYSTEM, so rules
    that look for reg.exe or powershell.exe miss it. Seen in Atomic
    Red Team T1547.001 Test 16. Anything else that hands its
    registry write off the same way will match too, whatever the
    tool is called.
references:
    - https://attack.mitre.org/techniques/T1547/001/
    - https://attack.mitre.org/techniques/T1218/
    - https://github.com/jeremiah-onyema/windows-detection-research
author: Jeremiah
date: 2026/03/26
tags:
    - attack.persistence
    - attack.privilege_escalation
    - attack.defense_evasion
    - attack.t1547.001
    - attack.t1218
logsource:
    category: registry_set
    product: windows
detection:
    selection_keys:
        TargetObject|contains:
            - '\SOFTWARE\Microsoft\Windows\CurrentVersion\Run\'
            - '\SOFTWARE\Microsoft\Windows\CurrentVersion\RunOnce\'
            - '\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Run\'
    selection_values:
        Details|endswith:
            - '.exe'
            - '.bat'
            - '.cmd'
            - '.ps1'
            - '.vbs'
            - '.js'
            - '.hta'
            - '.dll'
    selection_process:
        Image|endswith:
            - '\services.exe'
    condition: selection_keys and selection_values and selection_process
falsepositives:
    - Unlikely - services.exe writing executables
      to Run key has no known legitimate use case
level: critical
