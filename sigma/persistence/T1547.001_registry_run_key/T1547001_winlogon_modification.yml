title: Winlogon Userinit or Shell Value Modified
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: experimental
description: >
    Detects changes to the Winlogon Userinit or Shell registry
    values. These decide what runs at logon for every user on the
    machine, so a change here almost always means persistence. It
    shows up as two events, a backup of the original value and then
    the malicious one, and that backup write is itself a tell.
references:
    - https://github.com/jeremiah-onyema/windows-detection-research
    - https://attack.mitre.org/techniques/T1547/001/
author: Jeremiah
date: 2026/03/26
tags:
    - attack.persistence
    - attack.privilege_escalation
    - attack.t1547.001
logsource:
    category: registry_set
    product: windows
detection:
    selection:
        TargetObject|contains:
            - '\Microsoft\Windows NT\CurrentVersion\Winlogon\Userinit'
            - '\Microsoft\Windows NT\CurrentVersion\Winlogon\Shell'
    condition: selection
falsepositives:
    - Windows updates modifying Winlogon values
    - Domain policy changes
level: critical
